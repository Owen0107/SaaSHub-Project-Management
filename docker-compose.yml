version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: saashub-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    container_name: saashub-server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/saashub
      - JWT_SECRET=docker_jwt_secret_min_32_chars_long
      - JWT_REFRESH_SECRET=docker_refresh_secret_min_32_chars_long
      - PORT=5000
      - NODE_ENV=production
      - CLIENT_URL=http://localhost
      - GITHUB_WEBHOOK_SECRET=your_github_webhook_secret
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build: ./client
    container_name: saashub-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongodb_data:
